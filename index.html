<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God's Eye Sachsen — GIS Akquise-Tool</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Draw (Kreis-/Polygon-Tool) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <!-- Proj4 + Proj4Leaflet (EPSG:25833 → WGS84) -->
    <script src="https://unpkg.com/proj4@2.9.2/dist/proj4.js"></script>
    <script src="https://unpkg.com/proj4leaflet@1.0.2/src/proj4leaflet.js"></script>

    <!-- TurfJS (Spatial Operations) -->
    <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Top Bar -->
    <header id="topbar">
        <div class="topbar-left">
            <h1>God's Eye Sachsen</h1>
            <span class="subtitle">GIS Akquise-Tool</span>
        </div>
        <div class="topbar-center">
            <input type="text" id="search-input" placeholder="Gemeinde, Gemarkung oder Flurstück suchen..." />
        </div>
        <div class="topbar-right">
            <button id="btn-tools" class="topbar-btn" title="Werkzeuge">&#9881;</button>
            <button id="btn-layers" class="topbar-btn active" title="Layer">&#9776;</button>
            <button id="btn-export" class="topbar-btn" title="Export">&#8681;</button>
        </div>
    </header>

    <!-- Main Layout -->
    <div id="main-container">
        <!-- Sidebar Left: Layer Manager -->
        <aside id="sidebar-layers" class="sidebar">
            <div class="sidebar-header">
                <h2>Layer</h2>
                <button class="sidebar-close" data-target="sidebar-layers">&times;</button>
            </div>
            <div id="layer-tree"></div>
        </aside>

        <!-- Map -->
        <div id="map"></div>

        <!-- Sidebar Right: Steckbrief -->
        <aside id="sidebar-info" class="sidebar sidebar-right">
            <div class="sidebar-header">
                <h2 id="info-title">Steckbrief</h2>
                <button class="sidebar-close" data-target="sidebar-info">&times;</button>
            </div>
            <div id="info-content">
                <p class="info-placeholder">Klicke auf eine Gemeinde oder ein Flurstück, um Details zu sehen.</p>
            </div>
        </aside>
    </div>

    <!-- Status Bar -->
    <footer id="statusbar">
        <span id="status-coords">51.0504&deg;N, 13.7373&deg;E</span>
        <span id="status-zoom">Zoom: 8</span>
        <span id="status-features">0 Features sichtbar</span>
        <span id="status-connection" class="status-online">LUIS: Online</span>
    </footer>

    <!-- App Modules -->
    <script src="js/config.js"></script>
    <script src="js/layers.js"></script>
    <script src="js/luis-api.js"></script>
    <script src="js/rapis-wms.js"></script>
    <script src="js/map.js"></script>
    <script src="js/gemeinde.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/kontakt.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
